<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Weather Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ==========================================================================
     DYNAMIC METEOROLOGICAL PARTICLE ENGINE
     These containers act as hook layers for active CSS background animations.
     ========================================================================== -->
  <div class="weather-particles-layer">
    <div class="particle-rain-container"></div>
    <div class="particle-snow-container"></div>
    <div class="particle-mist-container"></div>
  </div>

  <!-- ==========================================================================
     MAIN APPLICATION VIEWPORT HOUSING
     ========================================================================== -->
  <div class="app-container">
    <main class="weather-card">
      
      <!-- Search Controller Input Matrix -->
      <section class="search-box">
        <input 
          type="text" 
          id="city-input" 
          class="search-input" 
          placeholder="Search global weather..."
          autocomplete="off"
          spellcheck="false"
        >
      </section>

      <!-- Application Initialization Slate (Default Landing State) -->
      <section id="welcome-msg" class="welcome-container">
        <h2 class="welcome-title">Weather Dashboard</h2>
        <p class="welcome-subtitle">Enter a city to display high-resolution real-time meteorological vectors.</p>
      </section>

      <!-- Active Presentation Data Stream Layout -->
      <section id="weather-info" class="hidden">
        
        <!-- Primary Structural Display Targets -->
        <div class="weather-main-details">
          <h1 id="city-display" class="city-name"></h1>
          <p id="date-display" class="date-stamp"></p>
          <div id="temp-display" class="temperature-display-group"></div>
          <p id="desc-display" class="weather-condition-desc"></p>
        </div>

        <!-- Secondary Performance Metric Telemetry Grid -->
        <div class="metadata-grid">
          <div class="meta-item">
            <span class="meta-label">Humidity</span>
            <span id="humidity-display" class="meta-value"></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Wind Velocity</span>
            <span id="wind-display" class="meta-value"></span>
          </div>
        </div>

      </section>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
